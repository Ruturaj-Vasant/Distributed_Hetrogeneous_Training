<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dtrain leader</title>
<link rel="stylesheet" href="/static/common.css">
</head>
<body>
<header>
  <h1>dtrain leader</h1>
  <span id="cfg-pill" class="cfg-pill">-</span>
  <nav>
    <a class="active" href="/leader">Leader</a>
    <a href="/worker">Worker</a>
    <a href="/watch">Watch</a>
  </nav>
  <span id="conn-dot"></span>
  <span id="conn-label">connecting...</span>
</header>
<div class="stats-bar">
  <div class="stat"><span class="stat-label">Phase</span><span class="stat-value waiting" id="stat-phase">waiting</span></div>
  <div class="stat"><span class="stat-label">Epoch</span><span class="stat-value" id="stat-epoch">-</span></div>
  <div class="stat"><span class="stat-label">Step</span><span class="stat-value" id="stat-step">-</span></div>
  <div class="stat"><span class="stat-label">Loss</span><span class="stat-value" id="stat-loss">-</span></div>
  <div class="stat"><span class="stat-label">Workers</span><span class="stat-value" id="stat-workers">-</span></div>
</div>
<main>
  <section class="card">
    <div class="card-header">Leader Controls</div>
    <div class="card-body">
      <div class="controls">
        <button class="primary" onclick="startTraining()">Start Training</button>
        <button onclick="admitAll()">Admit All Pending</button>
        <button class="danger" onclick="resetTraining()">Reset</button>
      </div>
    </div>
  </section>
  <section class="card">
    <div class="card-header">Loss Curve</div>
    <canvas id="loss-canvas" height="140"></canvas>
  </section>
  <section class="card">
    <div class="card-header">Active Workers</div>
    <div id="leader-workers"></div>
  </section>
  <section class="card">
    <div class="card-header">Pending Workers</div>
    <div id="pending-body"></div>
  </section>
</main>
<script src="/static/dashboard.js"></script>
<script>initDashboard('leader');</script>
</body>
</html>
